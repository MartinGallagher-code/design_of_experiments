<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="45%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="contourStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="contourWarm" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.75"/>
      <stop offset="20%" stop-color="#fb923c" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pointGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="1"/>
      <stop offset="40%" stop-color="#fb923c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip to circle -->
    <clipPath id="circleClip"><circle cx="256" cy="256" r="238"/></clipPath>
    <!-- Arrowhead marker -->
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#a5b4fc" stroke-width="1.2" stroke-opacity="0.7"/>
    </marker>
  </defs>

  <!-- ════ BACKGROUND ════ -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="#6366f1" stroke-opacity="0.2" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>

  <g clip-path="url(#circleClip)">

    <!-- ════ AXIS SYSTEM (centered at 256,240) ════ -->
    <!-- X axis -->
    <line x1="70" y1="240" x2="442" y2="240" stroke="#818cf8" stroke-opacity="0.12" stroke-width="1.5"/>
    <!-- Y axis -->
    <line x1="256" y1="52" x2="256" y2="428" stroke="#818cf8" stroke-opacity="0.12" stroke-width="1.5"/>

    <!-- Subtle grid -->
    <line x1="70" y1="160" x2="442" y2="160" stroke="#818cf8" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="70" y1="320" x2="442" y2="320" stroke="#818cf8" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="176" y1="52" x2="176" y2="428" stroke="#818cf8" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="336" y1="52" x2="336" y2="428" stroke="#818cf8" stroke-opacity="0.06" stroke-width="1"/>

    <!-- Tick marks on axes -->
    <line x1="176" y1="236" x2="176" y2="244" stroke="#818cf8" stroke-opacity="0.25" stroke-width="1.5"/>
    <line x1="336" y1="236" x2="336" y2="244" stroke="#818cf8" stroke-opacity="0.25" stroke-width="1.5"/>
    <line x1="252" y1="160" x2="260" y2="160" stroke="#818cf8" stroke-opacity="0.25" stroke-width="1.5"/>
    <line x1="252" y1="320" x2="260" y2="320" stroke="#818cf8" stroke-opacity="0.25" stroke-width="1.5"/>

    <!-- ════ RESPONSE SURFACE CONTOURS ════ -->
    <!-- Outer contour -->
    <ellipse cx="270" cy="228" rx="135" ry="95" fill="none" stroke="url(#contourWarm)" stroke-opacity="0.18" stroke-width="2" transform="rotate(-18, 270, 228)"/>
    <!-- Mid contour -->
    <ellipse cx="270" cy="228" rx="95" ry="65" fill="none" stroke="url(#contourWarm)" stroke-opacity="0.3" stroke-width="2.2" transform="rotate(-18, 270, 228)"/>
    <!-- Inner contour -->
    <ellipse cx="270" cy="228" rx="55" ry="38" fill="none" stroke="url(#contourWarm)" stroke-opacity="0.45" stroke-width="2.5" transform="rotate(-18, 270, 228)"/>
    <!-- Tight contour -->
    <ellipse cx="270" cy="228" rx="24" ry="16" fill="none" stroke="url(#contourWarm)" stroke-opacity="0.55" stroke-width="2.2" transform="rotate(-18, 270, 228)"/>

    <!-- ════ CONVERGENCE PATHS (steepest ascent) ════ -->
    <!-- Path from bottom-left corner -->
    <path d="M176,320 Q210,285 240,248 L258,232" fill="none" stroke="#a5b4fc" stroke-opacity="0.35" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
    <!-- Path from top-right corner -->
    <path d="M336,160 Q310,185 290,210 L278,222" fill="none" stroke="#a5b4fc" stroke-opacity="0.35" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
    <!-- Path from top-left -->
    <path d="M176,160 Q215,185 245,212 L260,224" fill="none" stroke="#a5b4fc" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
    <!-- Path from bottom-right -->
    <path d="M336,320 Q305,280 285,248 L275,236" fill="none" stroke="#a5b4fc" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="5,5" marker-end="url(#arrow)"/>

    <!-- ════ FACTORIAL DESIGN POINTS (corners of 2² design) ════ -->
    <!-- Outer glow rings -->
    <circle cx="176" cy="160" r="14" fill="#818cf8" opacity="0.08"/>
    <circle cx="336" cy="160" r="14" fill="#818cf8" opacity="0.08"/>
    <circle cx="176" cy="320" r="14" fill="#818cf8" opacity="0.08"/>
    <circle cx="336" cy="320" r="14" fill="#818cf8" opacity="0.08"/>
    <!-- Point bodies -->
    <circle cx="176" cy="160" r="7" fill="#818cf8" opacity="0.7" stroke="#a5b4fc" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="336" cy="160" r="7" fill="#818cf8" opacity="0.7" stroke="#a5b4fc" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="176" cy="320" r="7" fill="#818cf8" opacity="0.7" stroke="#a5b4fc" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="336" cy="320" r="7" fill="#818cf8" opacity="0.7" stroke="#a5b4fc" stroke-width="1.5" stroke-opacity="0.5"/>

    <!-- ════ AXIAL / STAR POINTS (CCD augmentation) ════ -->
    <circle cx="256" cy="110" r="5" fill="#a5b4fc" opacity="0.55" stroke="#c7d2fe" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="256" cy="370" r="5" fill="#a5b4fc" opacity="0.55" stroke="#c7d2fe" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="106" cy="240" r="5" fill="#a5b4fc" opacity="0.55" stroke="#c7d2fe" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="406" cy="240" r="5" fill="#a5b4fc" opacity="0.55" stroke="#c7d2fe" stroke-width="1" stroke-opacity="0.4"/>

    <!-- ════ CENTER / REPLICATE POINTS ════ -->
    <circle cx="256" cy="240" r="4" fill="#a5b4fc" opacity="0.4"/>
    <circle cx="250" cy="245" r="3" fill="#a5b4fc" opacity="0.3"/>
    <circle cx="262" cy="237" r="3" fill="#a5b4fc" opacity="0.3"/>

    <!-- ════ OPTIMAL POINT — the prize ════ -->
    <circle cx="270" cy="228" r="38" fill="url(#glow)"/>
    <circle cx="270" cy="228" r="14" fill="url(#pointGlow)" opacity="0.5"/>
    <circle cx="270" cy="228" r="7" fill="#c7d2fe" opacity="0.85"/>
    <circle cx="270" cy="228" r="3.5" fill="#fff"/>

  </g>

</svg>
