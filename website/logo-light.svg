<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="contourLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="glowLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#818cf8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pointGlowLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circleClip"><circle cx="256" cy="256" r="238"/></clipPath>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#6366f1" stroke-width="1.2" stroke-opacity="0.5"/>
    </marker>
  </defs>

  <!-- ════ BACKGROUND ════ -->
  <circle cx="256" cy="256" r="240" fill="none"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="#6366f1" stroke-opacity="0.08" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="#6366f1" stroke-opacity="0.04" stroke-width="1"/>

  <g clip-path="url(#circleClip)">

    <!-- ════ AXIS SYSTEM ════ -->
    <line x1="70" y1="240" x2="442" y2="240" stroke="#4338ca" stroke-opacity="0.1" stroke-width="1.5"/>
    <line x1="256" y1="52" x2="256" y2="428" stroke="#4338ca" stroke-opacity="0.1" stroke-width="1.5"/>

    <!-- Subtle grid -->
    <line x1="70" y1="160" x2="442" y2="160" stroke="#4338ca" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="70" y1="320" x2="442" y2="320" stroke="#4338ca" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="176" y1="52" x2="176" y2="428" stroke="#4338ca" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="336" y1="52" x2="336" y2="428" stroke="#4338ca" stroke-opacity="0.05" stroke-width="1"/>

    <!-- Tick marks -->
    <line x1="176" y1="236" x2="176" y2="244" stroke="#4338ca" stroke-opacity="0.2" stroke-width="1.5"/>
    <line x1="336" y1="236" x2="336" y2="244" stroke="#4338ca" stroke-opacity="0.2" stroke-width="1.5"/>
    <line x1="252" y1="160" x2="260" y2="160" stroke="#4338ca" stroke-opacity="0.2" stroke-width="1.5"/>
    <line x1="252" y1="320" x2="260" y2="320" stroke="#4338ca" stroke-opacity="0.2" stroke-width="1.5"/>

    <!-- ════ RESPONSE SURFACE CONTOURS ════ -->
    <ellipse cx="270" cy="228" rx="135" ry="95" fill="none" stroke="url(#contourLight)" stroke-opacity="0.08" stroke-width="2" transform="rotate(-18, 270, 228)"/>
    <ellipse cx="270" cy="228" rx="95" ry="65" fill="none" stroke="url(#contourLight)" stroke-opacity="0.14" stroke-width="2.2" transform="rotate(-18, 270, 228)"/>
    <ellipse cx="270" cy="228" rx="55" ry="38" fill="none" stroke="url(#contourLight)" stroke-opacity="0.22" stroke-width="2.5" transform="rotate(-18, 270, 228)"/>
    <ellipse cx="270" cy="228" rx="24" ry="16" fill="none" stroke="#4338ca" stroke-opacity="0.3" stroke-width="2" transform="rotate(-18, 270, 228)"/>

    <!-- ════ CONVERGENCE PATHS ════ -->
    <path d="M176,320 Q210,285 240,248 L258,232" fill="none" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
    <path d="M336,160 Q310,185 290,210 L278,222" fill="none" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
    <path d="M176,160 Q215,185 245,212 L260,224" fill="none" stroke="#6366f1" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
    <path d="M336,320 Q305,280 285,248 L275,236" fill="none" stroke="#6366f1" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="5,5" marker-end="url(#arrow)"/>

    <!-- ════ FACTORIAL DESIGN POINTS ════ -->
    <circle cx="176" cy="160" r="14" fill="#6366f1" opacity="0.06"/>
    <circle cx="336" cy="160" r="14" fill="#6366f1" opacity="0.06"/>
    <circle cx="176" cy="320" r="14" fill="#6366f1" opacity="0.06"/>
    <circle cx="336" cy="320" r="14" fill="#6366f1" opacity="0.06"/>
    <circle cx="176" cy="160" r="7" fill="#6366f1" opacity="0.5" stroke="#4338ca" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="336" cy="160" r="7" fill="#6366f1" opacity="0.5" stroke="#4338ca" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="176" cy="320" r="7" fill="#6366f1" opacity="0.5" stroke="#4338ca" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="336" cy="320" r="7" fill="#6366f1" opacity="0.5" stroke="#4338ca" stroke-width="1.5" stroke-opacity="0.3"/>

    <!-- ════ AXIAL / STAR POINTS ════ -->
    <circle cx="256" cy="110" r="5" fill="#6366f1" opacity="0.35" stroke="#4338ca" stroke-width="1" stroke-opacity="0.25"/>
    <circle cx="256" cy="370" r="5" fill="#6366f1" opacity="0.35" stroke="#4338ca" stroke-width="1" stroke-opacity="0.25"/>
    <circle cx="106" cy="240" r="5" fill="#6366f1" opacity="0.35" stroke="#4338ca" stroke-width="1" stroke-opacity="0.25"/>
    <circle cx="406" cy="240" r="5" fill="#6366f1" opacity="0.35" stroke="#4338ca" stroke-width="1" stroke-opacity="0.25"/>

    <!-- ════ CENTER / REPLICATE POINTS ════ -->
    <circle cx="256" cy="240" r="4" fill="#6366f1" opacity="0.25"/>
    <circle cx="250" cy="245" r="3" fill="#6366f1" opacity="0.2"/>
    <circle cx="262" cy="237" r="3" fill="#6366f1" opacity="0.2"/>

    <!-- ════ OPTIMAL POINT ════ -->
    <circle cx="270" cy="228" r="38" fill="url(#glowLight)"/>
    <circle cx="270" cy="228" r="14" fill="url(#pointGlowLight)" opacity="0.5"/>
    <circle cx="270" cy="228" r="7" fill="#4338ca" opacity="0.6"/>
    <circle cx="270" cy="228" r="3.5" fill="#312e81"/>

  </g>
</svg>
